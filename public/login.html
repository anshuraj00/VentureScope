<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VentureScope</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/login.css">
    <style>

        
    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header class="navbar">
    <div class="logo-section">
        <!-- Put your logo inside images folder -->
        <img src="images/logo.png" alt="logo">
        <h2>VentureScope</h2>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
    </nav>
    
</header>
<!-- ================= LOGIN SECTION ================= -->
<div class="container">

    <form class="login-card"
          onsubmit="event.preventDefault(); loginUser();">

        <h2>Welcome Back 👋</h2>
        <p>Login to continue</p>

        <!-- EMAIL -->
        <input 
            type="email"
            id="email"
            placeholder="Email Address"
            required
        >

        <!-- PASSWORD -->
        <input 
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <!-- LOGIN BUTTON -->
        <button type="submit">
            Login
        </button>

        <span>
            Don't have an account?
            <a href="register.html">Register</a>
        </span>

    </form>

</div>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    <p>© 2026 VentureScope | All Rights Reserved</p>
</footer>

<!-- AUTH JS -->
<script src="js/auth.js"></script>

</body>
</html>
