<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | VentureScope</title>

    <!-- CSS FILE -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->

<header class="navbar">
    <div class="logo-section">
        <img src="images/logo.png" alt="logo">
        <h2>VentureScope</h2>
    </div>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="dashboard.html">Ideas</a>
        <a href="profile.html">Profile</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>
</header>


<!-- ================= DASHBOARD ================= -->

<div class="dashboard">

    <h1>Welcome to VentureScope 🚀</h1>
    <p>Your Startup Idea Management Platform</p>

    <!-- CARDS -->
    <div class="card-container">
        <div class="card">
            <h3>💡 Submit Idea</h3>
            <p>Add your startup ideas easily.</p>
        </div>

        <div class="card">
            <h3>📊 My Ideas</h3>
            <p>Manage submitted ideas.</p>
        </div>

        <div class="card">
            <h3>👤 Profile</h3>
            <p>Update account details.</p>
        </div>
    </div>


    <!-- ================= IDEA FORM ================= -->

    <hr>

    <h2>💡 Create New Idea</h2>

    <form onsubmit="createIdea(event)" class="idea-form">
        <input type="text" id="title" placeholder="Enter Idea Title" required>

        <textarea id="description" placeholder="Enter Description" required></textarea>

        <input type="text" id="category" placeholder="Category (Optional)">

        <button type="submit">Add Idea</button>
    </form>


    <!-- ================= IDEA LIST ================= -->

    <hr>

    <h2>📊 All Ideas</h2>

    <div id="ideasContainer"></div>

</div>


<!-- ================= FOOTER ================= -->

<footer class="footer">
    <p>© 2026 VentureScope | Developed by Anshu</p>
</footer>




<!-- ================= AUTH SCRIPT ================= -->

<script>
    const token = localStorage.getItem("token");

    if (!token) {
        alert("Please login first");
        window.location.href = "login.html";
    }

    function logout(){
        localStorage.removeItem("token");
        window.location.href="login.html";
    }
</script>

<script src="js/auth.js"></script>

<!-- IDEA SCRIPT -->
<script src="js/idea.js"></script>

</body>
</html>
