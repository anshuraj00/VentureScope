<!DOCTYPE html>
<html>
<head>
<title>Register - VentureScope</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header class="navbar">
    <div class="logo-section">
        <img src="images/logo.png" alt="logo">
        <h2></h2>
        <h2>VentureScope</h2>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<div class="container">

<h2>Create Account 🚀</h2>

<input id="name" placeholder="Full Name" onblur="validateName()">
<p id="nameError" class="error"></p>

<input id="email" placeholder="Email" onblur="validateEmail()">
<p id="emailError" class="error"></p>

<input type="password"
id="password"
placeholder="Password"
onblur="validatePassword()">
<p id="passwordError" class="error"></p>

<button onclick="registerUser()">Register</button>

<p>
Already have account?
<a href="login.html">Login</a>
</p>

</div>

<!-- OTP Verification Section (Initially Hidden) -->
<div class="container" id="otpSection" style="display: none;">

<h2>Verify Your Email 📧</h2>
<p>Enter the OTP sent to your email</p>

<input type="text" id="otp" placeholder="Enter OTP">
<p id="otpError" class="error"></p>

<button onclick="verifyOTP()">Verify OTP</button>

<p>
Didn't receive OTP? <a href="#" onclick="resendOTP()">Resend</a>
</p>

</div>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    <p>© 2026 VentureScope | All Rights Reserved</p>
</footer>


<script src="js/auth.js"></script>

</body>
</html>
