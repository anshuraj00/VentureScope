<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | VentureScope</title>

    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

<header class="navbar">
    <div class="logo-section">
        <img src="images/logo.png" alt="logo">
        <h2>VentureScope</h2>
    </div>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="dashboard.html">Ideas</a>
        <a href="profile.html">Profile</a>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </nav>
</header>

<main class="profile-page">
    <section class="profile-header">
        <div class="profile-top">
            <div class="avatar-wrap">
                <img id="profileAvatar" class="profile-avatar" src="images/default-avatar.png" alt="Profile">
                <button type="button" class="avatar-edit-btn" id="avatarEditBtn" title="Edit Profile Picture">+</button>
                <input type="file" id="profileImageFile" accept="image/*" style="display: none;">
            </div>
            <div class="profile-meta">
                <div class="profile-top-row">
                    <h2 id="profileName">Username</h2>
                    <button class="btn small" id="editProfileBtn" type="button">Edit Profile</button>
                    <button class="btn small" id="followBtn" type="button" style="display: none;">Follow</button>
                </div>
                <p id="profileUsername" class="profile-username">@username</p>
                <p id="profileBio" class="profile-bio">Your bio appears here. Share something about yourself!</p>
                <div class="profile-stats">
                    <div><strong id="postsCount">0</strong><span>Posts</span></div>
                    <div><strong id="followersCount">0</strong><span>Followers</span></div>
                    <div><strong id="followingCount">0</strong><span>Following</span></div>
                </div>
            </div>
        </div>
    </section>

    <section class="profile-gallery" id="profileGallery">
        <div class="gallery-item">+</div>
        <div class="gallery-item">+</div>
        <div class="gallery-item">+</div>
        <div class="gallery-item">+</div>
        <div class="gallery-item">+</div>
        <div class="gallery-item">+</div>
    </section>

    <div id="postModal" class="post-modal" style="display: none;">
        <div class="post-modal-backdrop" onclick="closeProfileIdeaModal()"></div>
        <div class="post-modal-card">
            <button class="post-modal-close" onclick="closeProfileIdeaModal()">✕</button>
            <div class="post-modal-content">
                <div class="post-modal-images" id="postModalImages"></div>
                <div class="post-modal-info">
                    <div class="post-modal-header">
                        <h2 id="postModalTitle">Idea Title</h2>
                        <span id="postModalCategory" class="post-modal-category"></span>
                    </div>
                    <p id="postModalDescription">Post description goes here.</p>
                    <div class="post-modal-meta">
                        <span id="postModalDate"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <section class="profile-card" id="editSection" style="display: none;">
        <h1>Edit Profile</h1>

        <form id="profileForm" onsubmit="event.preventDefault(); saveProfile();">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" disabled>
            </div>

            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="company">Company</label>
                <input type="text" id="company" name="company">
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="gender-options">
                    <label><input type="radio" name="gender" id="genderMale" value="male"> Male</label>
                    <label><input type="radio" name="gender" id="genderFemale" value="female"> Female</label>
                    <label><input type="radio" name="gender" id="genderOther" value="other"> Other</label>
                </div>
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone">
            </div>

            <div class="form-group">
                <label for="skills">Skills (comma separated)</label>
                <input type="text" id="skills" name="skills">
            </div>

            <div class="form-group">
                <label for="profileImage">Profile image URL</label>
                <input type="text" id="profileImage" name="profileImage" readonly>
            </div>

            <div class="form-group">
                <label for="twitter">Twitter</label>
                <input type="url" id="twitter" name="twitter" placeholder="https://twitter.com/yourname">
            </div>

            <div class="form-group social-group">
                <label for="linkedin">LinkedIn</label>
                <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/yourname">
            </div>

            <div class="form-group social-group">
                <label for="github">GitHub</label>
                <input type="url" id="github" name="github" placeholder="https://github.com/yourname">
            </div>

            <button class="btn" type="submit">Save Profile</button>
        </form>

        <p id="message" class="message"></p>
    </section>
</main>

<footer class="footer">
    <p>© 2026 VentureScope | Developed by Anshu</p>
</footer>

<script src="js/profile.js"></script>
</body>
</html>
