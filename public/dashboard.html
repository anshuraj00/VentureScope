<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | VentureScope</title>

    <!-- CSS FILE -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->

<header class="navbar">
    <div class="logo-section">
        <img src="images/logo.png" alt="logo">
        <h2>VentureScope</h2>
    </div>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="dashboard.html">Ideas</a>
        <a href="profile.html">Profile</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>
</header>


<!-- ================= DASHBOARD ================= -->

<div class="dashboard">

    <h1>Welcome to VentureScope 🚀</h1>
    <p>Your Startup Idea Management Platform</p>

    <!-- SEARCH BAR -->
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="Search ideas by title, description, or category...">
        <button onclick="searchIdeas()">🔍 Search</button>
    </div>

    <!-- FEED TOGGLE -->
    <div class="feed-toggle">
        <button id="allPostsBtn" onclick="loadIdeas()" class="active">All Posts</button>
        <button id="followedPostsBtn" onclick="loadFollowedIdeas()">Following</button>
        <button id="suggestionsBtn" onclick="loadSuggestions()">Suggestions</button>
    </div>


    <!-- ================= IDEA FORM ================= -->

    <hr>

    <h2>💡 Create New Idea</h2>

    <form onsubmit="createIdea(event)" class="idea-form" enctype="multipart/form-data">
        <input type="text" id="title" placeholder="Enter Idea Title" required>

        <textarea id="description" placeholder="Enter Description" required></textarea>

        <input type="text" id="category" placeholder="Category (Optional)">

        <input type="file" id="images" name="images" accept="image/*" multiple>

        <button type="submit">Add Idea</button>
    </form>

    <div id="editIdeaSection" style="display: none; margin-top: 2rem;">
        <hr>
        <h2>✏️ Edit Idea</h2>
        <form id="editIdeaForm" class="idea-form" enctype="multipart/form-data" onsubmit="event.preventDefault(); submitIdeaEdit();">
            <input type="text" id="editTitle" placeholder="Edit Idea Title" required>
            <textarea id="editDescription" placeholder="Edit Description" required></textarea>
            <input type="text" id="editCategory" placeholder="Edit Category (Optional)">
            <input type="file" id="editImages" name="images" accept="image/*" multiple>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
                <button type="submit">Update Idea</button>
                <button type="button" onclick="cancelEditIdea()">Cancel</button>
            </div>
            <p style="font-size: 0.9rem; color: #444; margin-top: 0.5rem;">Upload new images to add them to the existing idea.</p>
        </form>
    </div>

    <!-- ================= NOTIFICATIONS SECTION ================= -->

    <hr>

    <div id="notificationsSection"></div>


    <!-- ================= RECOMMENDATIONS SECTION ================= -->

    <hr>

    <div id="recommendationsSection"></div>


    <!-- ================= IDEA LIST ================= -->

    <hr>

    <h2>📊 All Ideas</h2>

    <div id="ideasContainer"></div>

    <!-- ================= COMMENTS MODAL ================= -->
    <div id="commentsModal" class="comments-modal" style="display: none;">
        <div class="comments-modal-backdrop" onclick="closeCommentsModal()"></div>
        <div class="comments-modal-card">
            <button class="comments-modal-close" onclick="closeCommentsModal()">✕</button>
            <div class="comments-modal-header">
                <h2>Comments</h2>
            </div>
            <div class="comments-modal-body" id="commentsModalBody"></div>
            <div class="comments-modal-footer">
                <input type="text" id="commentInput" placeholder="Add a comment..." />
                <button onclick="submitComment()">Post</button>
            </div>
        </div>
    </div>

    <!-- ================= NOTIFICATIONS MODAL ================= -->
    <div id="notificationsModal" class="notifications-modal" style="display: none;">
        <div class="notifications-modal-backdrop" onclick="closeNotificationsModal()"></div>
        <div class="notifications-modal-card">
            <button class="notifications-modal-close" onclick="closeNotificationsModal()">✕</button>
            <div class="notifications-modal-header">
                <h2>Notifications</h2>
            </div>
            <div class="notifications-modal-body" id="notificationsModalBody"></div>
        </div>
    </div>

    <!-- ================= ADMIN PANEL ================= -->

    <div id="adminPanel" style="display: none;">
        <hr>
        <h2>🛡️ Admin Panel</h2>
        <div id="pendingIdeasContainer"></div>
    </div>

</div>


<!-- ================= FOOTER ================= -->

<footer class="footer">
    <!-- <p>© 2026 VentureScope | Developed by Anshu</p> -->
</footer>


<!-- ================= SCRIPTS - LOAD BEFORE INLINE CODE ================= -->
<script src="js/auth.js"></script>
<script src="js/idea.js"></script>
<script src="js/social.js"></script>

<!-- ================= AUTH SCRIPT ================= -->

<script>
    const token = localStorage.getItem("token");

    if (!token) {
        alert("Please login first");
        window.location.href = "login.html";
    }

    function logout(){
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href="login.html";
    }

    // Footer navigation functions
    function scrollToIdeaForm(){
        const ideaForm = document.querySelector('.idea-form');
        if(ideaForm){
            ideaForm.scrollIntoView({ behavior: 'smooth' });
        }
    }

    function loadMyIdeas(){
        // Load user's own ideas in the feed
        const token = localStorage.getItem("token");
        fetch("/api/ideas/my", {
            headers: {
                "Authorization": "Bearer " + token
            }
        })
        .then(res => res.json())
        .then(ideas => {
            const container = document.getElementById("ideasContainer");
            container.innerHTML = "";
            const approvedIdeas = ideas.filter(idea => idea.status === 'approved');
            if(approvedIdeas.length === 0){
                container.innerHTML = "<p>You haven't posted any approved ideas yet. Create your first one! 🚀</p>";
            } else {
                approvedIdeas.forEach(idea => {
                    const ideaDiv = createIdeaElement(idea);
                    container.appendChild(ideaDiv);
                });
            }
            // Update active button
            document.getElementById("allPostsBtn").classList.remove("active");
            document.getElementById("followedPostsBtn").classList.remove("active");
            document.getElementById("suggestionsBtn").classList.remove("active");
        })
        .catch(error => {
            console.error("Error loading my ideas:", error);
            alert("Error loading your ideas");
        });
    }

    function goToProfile(){
        window.location.href = "profile.html";
    }

    function showNotifications(){
        loadNotifications();
        document.getElementById('notificationsModal').style.display = 'flex';
    }

    function closeNotificationsModal(){
        document.getElementById('notificationsModal').style.display = 'none';
    }

    function loadNotifications(){
        const token = localStorage.getItem("token");
        fetch("/api/social/notifications", {
            headers: {
                "Authorization": "Bearer " + token
            }
        })
        .then(res => res.json())
        .then(notifications => {
            const container = document.getElementById('notificationsModalBody');
            container.innerHTML = '';

            if(notifications.length === 0){
                container.innerHTML = '<p>No notifications yet 🔔</p>';
                return;
            }

            notifications.forEach(notification => {
                const notifDiv = document.createElement('div');
                notifDiv.className = `notification-item ${notification.read ? 'read' : 'unread'}`;
                notifDiv.onclick = () => markNotificationAsRead(notification._id);

                let message = '';
                if(notification.type === 'like'){
                    message = `${notification.actor.name} liked your idea "${notification.idea.title}"`;
                } else if(notification.type === 'comment'){
                    message = `${notification.actor.name} commented on your idea "${notification.idea.title}"`;
                } else if(notification.type === 'follow'){
                    message = `${notification.actor.name} started following you`;
                } else if(notification.type === 'pending-idea'){
                    message = `${notification.actor.name} submitted a new idea for approval: "${notification.idea.title}"`;
                }

                notifDiv.innerHTML = `
                    <div class="notification-avatar">
                        <img src="${notification.actor.profileImage ? (notification.actor.profileImage.startsWith('http') ? notification.actor.profileImage : '/uploads/' + notification.actor.profileImage) : '/images/default-avatar.png'}" alt="${notification.actor.name}">
                    </div>
                    <div class="notification-content">
                        <p>${message}</p>
                        <small>${new Date(notification.createdAt).toLocaleDateString()}</small>
                    </div>
                    <div class="notification-actions">
                        ${!notification.read ? '<div class="notification-dot"></div>' : ''}
                        <button class="notification-delete-btn" onclick="event.stopPropagation(); deleteNotification('${notification._id}')">🗑️</button>
                    </div>
                `;

                container.appendChild(notifDiv);
            });

            // Update notification count in footer
            updateNotificationCount(notifications.filter(n => !n.read).length);
        })
        .catch(error => {
            console.error("Error loading notifications:", error);
        });
    }

    function markNotificationAsRead(notificationId){
        const token = localStorage.getItem("token");
        fetch(`/api/social/notification/${notificationId}/read`, {
            method: 'PUT',
            headers: {
                "Authorization": "Bearer " + token
            }
        })
        .then(() => {
            loadNotifications(); // Reload to update UI
        })
        .catch(error => {
            console.error("Error marking notification as read:", error);
        });
    }

    function deleteNotification(notificationId){
        if(!confirm("Are you sure you want to delete this notification?")) return;

        const token = localStorage.getItem("token");
        fetch(`/api/social/notification/${notificationId}`, {
            method: 'DELETE',
            headers: {
                "Authorization": "Bearer " + token
            }
        })
        .then(res => res.json())
        .then(data => {
            if(data.message === "Notification deleted"){
                loadNotifications(); // Reload to update UI
            } else {
                alert(data.message || "Error deleting notification");
            }
        })
        .catch(error => {
            console.error("Error deleting notification:", error);
            alert("Error deleting notification");
        });
    }

    function updateNotificationCount(count){
        const notifIcon = document.querySelector('.footer-nav-item:nth-child(4) .footer-nav-icon');
        if(notifIcon){
            // Remove existing badge
            const existingBadge = notifIcon.querySelector('.notification-badge');
            if(existingBadge) existingBadge.remove();

            if(count > 0){
                const badge = document.createElement('span');
                badge.className = 'notification-badge';
                badge.textContent = count > 99 ? '99+' : count;
                notifIcon.appendChild(badge);
            }
        }
    }

    // Load all data on page load
    window.addEventListener('load', function() {
        console.log("✅ Page loaded, calling loadIdeas() and checkAdmin()");
        loadIdeas();
        loadNotifications();
        loadRecommendations();
        checkAdmin();
    });
</script>

<!-- ================= FOOTER NAVIGATION ================= -->
<footer class="footer-nav">
    <div class="footer-nav-item" onclick="scrollToIdeaForm()">
        <div class="footer-nav-icon">💡</div>
        <div class="footer-nav-text">Submit</div>
    </div>
    <div class="footer-nav-item" onclick="loadMyIdeas()">
        <div class="footer-nav-icon">📊</div>
        <div class="footer-nav-text">My Ideas</div>
    </div>
    <div class="footer-nav-item" onclick="goToProfile()">
        <div class="footer-nav-icon">👤</div>
        <div class="footer-nav-text">Profile</div>
    </div>
    <div class="footer-nav-item" onclick="showNotifications()">
        <div class="footer-nav-icon">🔔</div>
        <div class="footer-nav-text">Notifications</div>
    </div>
</footer>

</body>
</html>
